<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiniOS Trace Viewer</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>MiniOS Trace Viewer</h1>
      <div id="drop-zone" class="drop-zone">
        Drop a <code>.json</code> trace file here or
        <label for="file-input">browse</label>
        <input type="file" id="file-input" accept=".json" />
      </div>
      <span id="status-msg">Loading sample data…</span>
    </header>

    <nav id="tab-bar" class="tab-bar">
      <button class="active" data-tab="waterfall">Waterfall</button>
      <button data-tab="stats">Stats</button>
      <button data-tab="dashboard">Dashboard</button>
    </nav>

    <div id="waterfall-panel" class="panel">
      <canvas id="waterfall-canvas"></canvas>
    </div>

    <div id="stats-panel" class="panel" style="display:none">
      <div id="stats-body"></div>
    </div>

    <div id="dashboard-panel" class="panel" style="display:none">
      <div id="dashboard-view">
        <h2>System Dashboard</h2>
        <p>Paste the output of <code>cat /proc/dashboard</code> below:</p>
        <textarea id="dashboard-input" rows="12" cols="50" placeholder="uptime_ticks: 5000&#10;memory_frames_free: 63000&#10;..."></textarea>
        <button onclick="renderDashboard()">Render</button>
        <div id="dashboard-output"></div>
      </div>
    </div>
  </div>

  <div id="tooltip"></div>

  <script src="js/utils.js"></script>
  <script src="js/parser.js"></script>
  <script src="js/waterfall.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
