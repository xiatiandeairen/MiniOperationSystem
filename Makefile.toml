[tasks.build]
description = "Compile all workspace crates for bare-metal target"
command = "cargo"
args = ["build", "--workspace", "-Z", "build-std=core,compiler_builtins,alloc",
        "-Z", "build-std-features=compiler-builtins-mem"]

[tasks.build-release]
workspace = false
description = "Compile in release mode"
command = "cargo"
args = ["build", "--workspace", "--release",
        "-Z", "build-std=core,compiler_builtins,alloc",
        "-Z", "build-std-features=compiler-builtins-mem"]

[tasks.test]
description = "Run host-side unit tests (common + trace-macros only)"
command = "cargo"
args = ["test", "-p", "minios-common", "-p", "minios-trace-macros",
        "--target", "x86_64-unknown-linux-gnu"]

[tasks.clippy]
description = "Lint all crates"
command = "cargo"
args = ["clippy", "--workspace",
        "-Z", "build-std=core,compiler_builtins,alloc",
        "-Z", "build-std-features=compiler-builtins-mem",
        "--", "-D", "warnings"]

[tasks.fmt]
description = "Format all source files"
command = "cargo"
args = ["fmt", "--all"]

[tasks.fmt-check]
description = "Check formatting without modifying files"
command = "cargo"
args = ["fmt", "--all", "--check"]

[tasks.check]
description = "Quick type-check without linking"
command = "cargo"
args = ["check", "--workspace",
        "-Z", "build-std=core,compiler_builtins,alloc",
        "-Z", "build-std-features=compiler-builtins-mem"]

[tasks.doc]
description = "Generate API documentation"
command = "cargo"
args = ["doc", "--workspace", "--no-deps"]

[tasks.clean]
description = "Remove build artifacts"
command = "cargo"
args = ["clean"]

[tasks.image]
workspace = false
description = "Build boot-image tool (first time only)"
script = '''
if [ ! -f tools/boot-image/target/x86_64-unknown-linux-gnu/release/boot-image ]; then
    cd tools/boot-image && cargo +nightly build --release --target x86_64-unknown-linux-gnu
fi
'''

[tasks.boot-img]
workspace = false
description = "Create bootable disk image from kernel ELF"
dependencies = ["build-release", "image"]
script = '''
./tools/boot-image/target/x86_64-unknown-linux-gnu/release/boot-image \
    target/x86_64-unknown-none/release/minios-kernel
'''

[tasks.run]
workspace = false
description = "One-command: build + create image + boot in QEMU (serial on stdout)"
dependencies = ["boot-img"]
script = '''
qemu-system-x86_64 \
    -drive format=raw,file=target/x86_64-unknown-none/release/minios-bios.img \
    -nographic \
    -m 256M \
    -no-reboot \
    -no-shutdown
'''

[tasks.run-gui]
workspace = false
description = "Boot with QEMU graphical window + serial on stdout"
dependencies = ["boot-img"]
script = '''
qemu-system-x86_64 \
    -drive format=raw,file=target/x86_64-unknown-none/release/minios-bios.img \
    -serial stdio \
    -m 256M \
    -no-reboot \
    -no-shutdown
'''

[tasks.run-trace]
workspace = false
description = "Boot and capture trace data to file"
dependencies = ["boot-img"]
script = '''
qemu-system-x86_64 \
    -drive format=raw,file=target/x86_64-unknown-none/release/minios-bios.img \
    -serial file:trace-output.log \
    -m 256M \
    -no-reboot \
    -no-shutdown \
    -display none
'''

[tasks.debug]
workspace = false
description = "Boot and wait for GDB connection on port 1234"
dependencies = ["boot-img"]
script = '''
qemu-system-x86_64 \
    -drive format=raw,file=target/x86_64-unknown-none/release/minios-bios.img \
    -serial stdio \
    -m 256M \
    -s -S \
    -no-reboot
'''

[tasks.ci]
description = "Run all CI checks"
workspace = false
dependencies = ["fmt-check", "clippy", "test"]
